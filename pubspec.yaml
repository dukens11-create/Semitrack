name: semitrack_mobile
description: Semitrack truck GPS mobile app scaffold
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  http: ^1.2.2
  flutter_map: ^7.0.2
  mapbox_maps_flutter: ^2.20.1
  latlong2: ^0.9.1
  shared_preferences: ^2.3.0
  geolocator: ^13.0.2
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Asset registration for the Semitrack Flutter app.
  #
  # truck_top.png — 64×64 px RGBA PNG, top-down view of a red/white semi-truck.
  # Used as the live-position marker on the TruckMapScreen flutter_map overlay.
  #
  # Usage in code:
  #   Image.asset('assets/icons/truck_top.png', width: 32, height: 32)
  #
  # To replace the marker with a custom image:
  #   1. Overwrite assets/icons/truck_top.png with your PNG (recommended: 64×64 px RGBA).
  #   2. Run `flutter pub get` to re-bundle assets.
  #   3. Hot-reload or rebuild the app.
  assets:
    - assets/icons/truck_top.png
