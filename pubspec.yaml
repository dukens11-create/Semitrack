name: semitrack_mobile
description: Semitrack truck GPS mobile app scaffold
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  go_router: ^14.2.7
  http: ^1.2.2
  flutter_map: ^7.0.2
  mapbox_maps_flutter: ^2.20.1
  latlong2: ^0.9.1
  shared_preferences: ^2.3.0
  geolocator: ^13.0.2
  flutter_tts: ^4.0.2
  firebase_core: ^3.6.0
  # turf: ^0.0.9
  # Optional: add `turf` (turf_dart) if you need true point-to-*segment*
  # distance in getPOIsOnRoute (lib/utils/route_utils.dart) instead of
  # the current point-to-vertex haversine sampling.  Mapbox routes are
  # densely sampled (~10–50 m per vertex), so the vertex approach is
  # accurate enough for most use cases without this extra dependency.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Asset registration for the Semitrack Flutter app.
  #
  # assets/icons/truck_top.png
  #   64×64 px RGBA PNG, top-down view of a red/white semi-truck.
  #   Used as the live-position marker on the TruckMapScreen flutter_map overlay.
  #   Usage: Image.asset('assets/icons/truck_top.png', width: 32, height: 32)
  #   To replace: overwrite the PNG (recommended: 64×64 px RGBA), then
  #   run `flutter pub get` and hot-reload or rebuild the app.
  #
  # assets/logo_brand_markers/
  #   PNG marker icons for POI types (e.g. pilot.png, loves.png).
  #   Loaded via rootBundle.load('assets/logo_brand_markers/<filename>').
  #
  # assets/locations.json
  #   POI dataset used to populate truck-stop markers on the map.
  #
  # assets/walmart-stores.json
  #   SINGLE SOURCE OF TRUTH for all Walmart store POI locations (4,640 entries).
  #   This is the ONLY file the app loads for Walmart map markers and addresses.
  #   Do NOT add Walmart entries to locations.json or hardcode them anywhere.
  #   Contains: id, store_id, name, address, postal_code, lat, lng, verified,
  #   country, stateOrProvince, city.
  #   Loaded exclusively by loadWalmartPois() in poi_service.dart.
  #
  # assets/restaurants.json
  #   Restaurant POI dataset (10 000 entries, MongoDB sample format).
  #   Each entry has _id.$oid, name, contact.location [lng, lat], stars,
  #   categories, and grades.  Loaded by loadRestaurantPois() in
  #   poi_service.dart and appended to the combined POI list so every
  #   restaurant appears on the map with a restaurant.png marker.
  assets:
    - assets/icons/truck_top.png
    - assets/icons/walmart.png
    - assets/logo_brand_markers/
    - assets/locations.json
    - assets/data/truck_stops.json
    - assets/data/walmart.json
    - assets/walmart-stores.json
    - assets/restaurants.json
    # US states and Canadian provinces reference data (from welcome states pack)
    - assets/welcome-states-pack/states_provinces.json
