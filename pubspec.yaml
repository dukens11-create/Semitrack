name: semitrack_mobile
description: Semitrack truck GPS mobile app scaffold
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.0
  geolocator: ^13.0.2
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Register the top-down truck image used as the navigation marker.
  # NOTE: The user must place assets/icons/truck_top.png in the project
  # before running a build.  The PR cannot include the PNG itself.
  assets:
    - assets/icons/truck_top.png
