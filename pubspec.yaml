name: semitrack_mobile
description: Semitrack truck GPS mobile app scaffold
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  http: ^1.2.2
  flutter_map: ^7.0.2
  mapbox_maps_flutter: ^2.20.1
  latlong2: ^0.9.1
  shared_preferences: ^2.3.0
  geolocator: ^13.0.2
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Asset registration for the Semitrack Flutter app.
  #
  # assets/icons/truck_top.png
  #   64×64 px RGBA PNG, top-down view of a red/white semi-truck.
  #   Used as the live-position marker on the TruckMapScreen flutter_map overlay.
  #   Usage: Image.asset('assets/icons/truck_top.png', width: 32, height: 32)
  #   To replace: overwrite the PNG (recommended: 64×64 px RGBA), then
  #   run `flutter pub get` and hot-reload or rebuild the app.
  #
  # assets/truck_stop_poi/
  #   Contains PNG marker icons for each truck-stop POI category and the
  #   locations.json dataset.  All PNGs in this folder are automatically
  #   registered with Mapbox at runtime by registerPoiIcons() in
  #   lib/services/poi_service.dart using normalised image IDs (lowercase,
  #   underscores, no extension).  The fallback icon for any POI whose icon
  #   PNG is absent is truck_parking.png.
  #   To add a new icon: drop the PNG here, update locations.json "icon" field
  #   to match, run `flutter pub get`, and rebuild.
  #
  # assets/poi/
  #   Additional POI data (e.g. poi_data.json) used for supplementary datasets.
  assets:
    - assets/icons/truck_top.png
    - assets/truck_stop_poi/
    - assets/poi/
