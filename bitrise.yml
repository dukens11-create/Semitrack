format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  primary:
    steps:
    - git-clone@8: {}
    - flutter-installer@1:
        inputs:
        - version: stable
        - is_debug: "false"
    - restore-dart-cache@1: {}
    - flutter-analyze@0: {}
    - save-dart-cache@1: {}
    - deploy-to-bitrise-io@2: {}
